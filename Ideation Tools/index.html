<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    padding: 30px;
    font-family: Roboto, Arial, sans-serif;
    background: #f5f7f6;
}

.container {
    max-width: 1400px;
    margin: auto;
    display: flex;
    gap: 25px;
    height: 700px;
}

.image-section {
    flex: 2;
}

.image-section img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: white;
    border: 1px solid #d9e2dc;
    border-radius: 12px;
}

.annotation-section {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.tab-buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 12px;
}

.tab-button {
    padding: 12px;
    border: none;
    background: #57bb8a;
    cursor: pointer;
    border-radius: 8px;
    font-weight: 600;
    transition: 0.2s;
}

.tab-button:hover {
    background: #c9d7cf;
}

.tab-button.active {
    background: #4f7c5c;
    color: white;
}

.annotation-content {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 12px;
    border-left: 6px solid #4f7c5c;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow-y: auto;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

.tab-content h2 {
    margin-top: 0;
    color: #2f4f3f;
}

@media (max-width: 900px) {
    .container {
        flex-direction: column;
        height: auto;
    }

    .image-section {
        height: 400px;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Image -->
    <div class="image-section">
        <img src="your-image.jpg" alt="Evidence">
    </div>

    <!-- Annotations -->
    <div class="annotation-section">

        <div class="tab-buttons">
            <button class="tab-button active" onclick="showTab('moodboard', this)">Moodboard</button>
            <button class="tab-button" onclick="showTab('mindmap', this)">Mind Map</button>
            <button class="tab-button" onclick="showTab('brainstorm', this)">Brainstorm</button>
            <button class="tab-button" onclick="showTab('sketch', this)">Sketch</button>
        </div>

        <div class="annotation-content">

            <div id="moodboard" class="tab-content active">
                <h2>Moodboard</h2>
                <p>Add your moodboard annotations here.</p>
            </div>

            <div id="mindmap" class="tab-content">
                <h2>Mind Map</h2>
                <p>Add your mind map annotations here.</p>
            </div>

            <div id="brainstorm" class="tab-content">
                <h2>Brainstorm</h2>
                <p>Add your brainstorm annotations here.</p>
            </div>

            <div id="sketch" class="tab-content">
                <h2>Sketch</h2>
                <p>Add your sketch annotations here.</p>
            </div>

        </div>

    </div>

</div>

<script>
function showTab(tabId, button) {

    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
    });

    document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
    });

    document.getElementById(tabId).classList.add('active');
    button.classList.add('active');
}
</script>

</body>
</html>
