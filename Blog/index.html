    <div class="qa">
        <label>Creative Thinking</label>
        <textarea>
Who are my actors in my software solution?
My main actor is the user while my secondary actor consists of the developer, this was reflected in my use case diagram which showed the user intiating various processes to identify ferns while the developer intiated secondary processes that dealt with the backend of creating, modifying and deleting fern keys and training images or reading error reports.

This question allowed me to better define my actors and their roles within the system before designing my use case diagram, ensuring no use cases were left out.
</textarea>
        <label>Follow-up</label>
        <textarea>
Why is a use case diagram required?
A use case diagram was the most effective way to visualise how my system would interact with actors, being the best tool to explain the workings of my system my client for briefing as opposed to attempting to explain by word. Ultimately the presence of a use case diagram streamlined client briefing.

This question allowed me to understand the importance of a use case diagram and tailor my use case diagram to enhancing understanding of user interaction with the system through actor use case association.
</textarea>

    <div class="qa">
        <label>Critical Thinking</label>
        <textarea>How can I show the fern identification?

By using a data flow diagram to visualise the inner processes of my system, I was able to demonstrate how ferns are identified through a a key based questionaire system or processed photos through photo recognition which I was able to develop in to functional requirements later.

This question aided me in designing my data flow diagram as it gave me a basis on what to depict, the flow of data - specifically the flow of data as the user attempts to identify a fern
</textarea>

        <label>Follow-up</label>
        <textarea>Why is the visualisation of the flow of data important?

Visualising the flow of data was crucial to ensure all data required was accounted for and that when it came to development it could be refered back to as a blue print, allowing for easy identification of what data should be inputted and what data should be outputted at each process

This question emphasised the importance of data flow, demonstrating to myself how it could be refered back to later as a blue print or instruction manual for the input and output of processes in the development stage.</textarea>

    <div class="qa">
        <label>Creative Thinking</label>
        <textarea>What is wrong with my current data flow set up?

At the time, I had two seperate databases for fern keys and fern training images respectively, however this appeared confusing when shown to others and also seemed convoluted to implement during development. This lead to the decision of combining the two data bases in to one.

This question allowed me to better streamline the data flow of my system, as its previous convoluted design with two databases was confusing and ultimately seemed difficult to implement later in defense.
</textarea>

        <label>Follow-up</label>
        <textarea>What is missing from my current data flow set up?

At the time, I also only had a process of the user submitting the mis-identification report, however there was no process in which the external entity developer would interact with these which failed to show the full data flow referenced in my functional requirements. Editing my data flow to include a process in which the developer external entity would recieve and review these mis-identification reports amended this issue.

This question allowed me to identify missing data flow in my DFD diagram, ensuring all data was accounted for during the development phase.
</textarea>

    </div>

    <div class="qa">
        <label>Critical Thinking</label>
        <textarea placeholder="">
Why is my scope to The City of Wyndham?

The City of Wyndham only contains a relatively small amount of native fern species which aligns with my economic constraints of being a full-time high-school student with limited time, elsewise I risk being too shallow or inaccurate with identification capabilities. Furthermore this improves originality by serving as a tool specific and more accurate to The City of Wyndham.

This question allowed me to justify why The City of Wyndham was an ideal area for my scope due and why a larger area was ill fitted.
</textarea>

        <label>Follow-up</label>
        <textarea placeholder="Follow-up question...">
Who would benefit from a tool like this within The City of Wyndham?

After doing some research using surveys, I found there was a considerate fern hobbyist following within Wyndham which would benefit from this tool. After following up with my client in the interview who also frequently visited The City of Wyndham, it was shown that it was an ideal area of scope due to its manageable natural fern population and fern following.

This question allowed me to measure the area of the market I am attempting to fulfill and who would benefit from a fern identification tool within Wyndham.
</textarea>

    <div class="qa">
        <label>Question 2</label>
        <textarea>What is surprising about my user classes?

After conducting surveys, a wide range of users were established which could be grouped into seperate users classes based off their fern experience and interest, however one defining feature is they all varied in technical expertise and fern experience.

This question made me realise the variety of users that my software solution would have to accomodate for to ensure ease of use for all user classes.</textarea>

        <label>Follow-up</label>
        <textarea>
Whats useful about these user classes?

The existence of these varied user classes allowed me to tailor my non-functional requirements and constraints accordling, reflected in my social constraints and non-functional requirements discussing intuitiveness and ease of use in terms of navigating to accomodate a wide range of technical expertise and fern experience across user classes.

This question allowed me to better understand how I should tailor my NRFs and constraints around my user classes to ensure my software solution is intuitive and easy to use for all my target users.
</textarea>

What do I want my software solution to look like?
Considering my solution aims to be an identification tool for ferns, I choose to employ a green colour scheme which themetically fit with ferns. This was an attempt to make the solution appeal to fern hobbyist who are my main users.

This question allowed me to unpack what I wanted my software solution to be look like before beginning my ideation tools, giving me valuable insight to design my mood board.
</textarea>
        <label>Follow-up</label>
        <textarea>
What is wrong with my current colour scheme choice?

Previously, the green colour scheme made it read to hard read text, which challenged my non-functional requirements discussing ease of navigation. This lead to the adoption of a mix of white and green, which enhanced readability dramatically and was reflected in my non-functional requirements.

This question demonstrated the issue with my current colour choices of my software solution, leading to my decision to adopt a better contrasting green and white that dramatically enhanced readability.</textarea>
